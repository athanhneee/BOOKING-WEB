services:
  - type: web
    name: minhthanhvilla-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: 1

      # ── Database ──────────────────────────────────────────────────────────
      - key: MYSQLHOST
        sync: false
      - key: MYSQLPORT
        value: 3306
      - key: MYSQLDATABASE
        sync: false
      - key: MYSQLUSER
        sync: false
      - key: MYSQLPASSWORD
        sync: false
      - key: MYSQL_SSL
        value: true

      # ── JWT & Secrets ──────────────────────────────────────────────────────
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: TOKEN_HASH_SECRET
        sync: false
      - key: OTP_HASH_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false

      # ── CORS / Frontend ────────────────────────────────────────────────────
      - key: CLIENT_ORIGIN
        value: https://minhthanhvilla.vercel.app
      - key: CORS_ORIGINS
        value: https://minhthanhvilla.vercel.app

      # ── Cookie (cross-domain) ──────────────────────────────────────────────
      - key: REFRESH_TOKEN_COOKIE_SAME_SITE
        value: none
      - key: REFRESH_TOKEN_COOKIE_SECURE
        value: true
      - key: ALLOW_REFRESH_TOKEN_IN_BODY
        value: false
      - key: ALLOW_REFRESH_TOKEN_IN_HEADER
        value: false

      # ── Google OAuth ───────────────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false

      # ── VNPay ─────────────────────────────────────────────────────────────
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_PAYMENT_URL
        value: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - key: VNPAY_RETURN_URL
        sync: false

      # ── MoMo ──────────────────────────────────────────────────────────────
      - key: MOMO_PARTNER_CODE
        sync: false
      - key: MOMO_ACCESS_KEY
        sync: false
      - key: MOMO_SECRET_KEY
        sync: false
      - key: MOMO_ENDPOINT
        value: https://test-payment.momo.vn/v2/gateway/api/create
      - key: MOMO_REDIRECT_URL
        sync: false
      - key: MOMO_IPN_URL
        sync: false

      # ── Email (SMTP) ───────────────────────────────────────────────────────
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false

      # ── Cloudflare R2 (public images) ─────────────────────────────────────
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: booking-images
      - key: R2_PUBLIC_BASE_URL
        sync: false

      # ── Cloudflare R2 (private docs) ──────────────────────────────────────
      - key: R2_PRIVATE_ACCESS_KEY_ID
        sync: false
      - key: R2_PRIVATE_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PRIVATE_BUCKET
        value: identity-docs-private
      - key: R2_PRIVATE_ENDPOINT
        sync: false
      - key: R2_PRIVATE_REGION
        value: auto

      # ── OpenAI ────────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VISION_MODEL
        value: gpt-4.1-mini
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: 1536

      # ── Qdrant (Semantic Search) ───────────────────────────────────────────
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION_LISTINGS
        value: booking_listings
